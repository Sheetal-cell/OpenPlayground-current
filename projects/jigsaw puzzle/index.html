<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jigsaw Puzzle Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --puzzle-bg: #1a1a1a;
            --accent: #3b82f6;
        }

        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            touch-action: none;
        }

        #game-canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            background: var(--puzzle-bg);
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 0 auto;
            overflow: hidden;
            border: 4px solid #1e293b;
        }

        canvas {
            display: block;
            touch-action: none;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .control-panel {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
        }

        .win-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .win-overlay.active {
            display: flex;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .difficulty-btn.active {
            background-color: var(--accent);
            color: white;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <header class="max-w-4xl mx-auto w-full mb-6 text-center">
        <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
            JIGSAW PUZZLE
        </h1>
        <p class="text-slate-400 text-sm">Drag pieces to the correct position. They snap when close!</p>
    </header>

    <main class="flex-grow flex flex-col items-center">
        <div id="game-canvas-container">
            <canvas id="puzzle-canvas"></canvas>
            
            <!-- Win Overlay -->
            <div id="win-overlay" class="win-overlay rounded-lg">
                <div class="bg-slate-800 p-8 rounded-2xl border-2 border-emerald-500 shadow-2xl">
                    <h2 class="text-4xl font-bold text-emerald-400 mb-4">Puzzle Complete!</h2>
                    <p id="stats-text" class="text-slate-300 mb-6 font-mono"></p>
                    <button onclick="resetGame()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-8 rounded-full transition-all transform hover:scale-105">
                        Play Again
                    </button>
                </div>
            </div>
        </div>

        <div class="control-panel max-w-4xl w-full mt-6 p-6 rounded-2xl shadow-xl flex flex-wrap gap-4 items-center justify-between border border-slate-700">
            <div class="flex gap-2">
                <button onclick="setDifficulty(3)" class="difficulty-btn active px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition-colors" id="btn-easy">Easy (3x3)</button>
                <button onclick="setDifficulty(4)" class="difficulty-btn px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition-colors" id="btn-med">Med (4x4)</button>
                <button onclick="setDifficulty(6)" class="difficulty-btn px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition-colors" id="btn-hard">Hard (6x6)</button>
            </div>

            <div class="flex gap-3">
                <button id="peek-btn" class="bg-slate-700 p-3 rounded-lg hover:bg-slate-600 transition-all flex items-center gap-2" title="Peek at Reference">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                    Peek
                </button>
                <button onclick="resetGame()" class="bg-blue-600 p-3 rounded-lg hover:bg-blue-500 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                    Shuffle
                </button>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('puzzle-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-canvas-container');
        const winOverlay = document.getElementById('win-overlay');
        const peekBtn = document.getElementById('peek-btn');

        let img = new Image();
        let pieces = [];
        let difficulty = 3; // Grid size
        let selectedPiece = null;
        let isPeeking = false;
        let startTime = null;
        let moves = 0;
        let isWon = false;

        // Configuration
        const SNAP_DISTANCE = 40;
        const SHUFFLE_PADDING = 50;

        // Image sources (using high quality Unsplash placeholders)
        const IMAGES = [
            'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80'
        ];

        class Piece {
            constructor(sx, sy, sw, sh, x, y, correctX, correctY) {
                this.sx = sx; // Source X (in image)
                this.sy = sy; // Source Y (in image)
                this.sw = sw; // Width
                this.sh = sh; // Height
                this.x = x;   // Current Canvas X
                this.y = y;   // Current Canvas Y
                this.correctX = correctX;
                this.correctY = correctY;
                this.isLocked = false;
                this.offset = { x: 0, y: 0 };
            }

            draw() {
                ctx.save();
                
                // Draw shadow if dragging
                if (selectedPiece === this) {
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 15;
                    ctx.shadowOffsetX = 5;
                    ctx.shadowOffsetY = 5;
                }

                // Draw piece
                ctx.drawImage(img, this.sx, this.sy, this.sw, this.sh, this.x, this.y, this.sw, this.sh);

                // Draw border
                ctx.strokeStyle = this.isLocked ? 'rgba(34, 197, 94, 0.4)' : 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x, this.y, this.sw, this.sh);
                
                ctx.restore();
            }

            checkSnap() {
                if (this.isLocked) return;
                
                const dist = Math.sqrt(Math.pow(this.x - this.correctX, 2) + Math.pow(this.y - this.correctY, 2));
                if (dist < SNAP_DISTANCE) {
                    this.x = this.correctX;
                    this.y = this.correctY;
                    this.isLocked = true;
                    return true;
                }
                return false;
            }
        }

        function initGame() {
            const randomImg = IMAGES[Math.floor(Math.random() * IMAGES.length)];
            img.src = randomImg;
            img.onload = () => {
                resizeCanvas();
                createPieces();
                shufflePieces();
                isWon = false;
                moves = 0;
                startTime = Date.now();
                winOverlay.classList.remove('active');
                render();
            };
        }

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        function createPieces() {
            pieces = [];
            const pw = canvas.width / difficulty;
            const ph = canvas.height / difficulty;

            for (let r = 0; r < difficulty; r++) {
                for (let c = 0; c < difficulty; c++) {
                    const sx = (c * img.width) / difficulty;
                    const sy = (r * img.height) / difficulty;
                    const sw = img.width / difficulty;
                    const sh = img.height / difficulty;
                    
                    const p = new Piece(
                        sx, sy, sw, sh,
                        0, 0, // Temp pos
                        c * pw, r * ph // Correct pos
                    );
                    // Actual draw dimensions on canvas
                    p.sw = pw;
                    p.sh = ph;
                    pieces.push(p);
                }
            }
        }

        function shufflePieces() {
            pieces.forEach(p => {
                if (!p.isLocked) {
                    p.x = Math.random() * (canvas.width - p.sw);
                    p.y = Math.random() * (canvas.height - p.sh);
                }
            });
        }

        function setDifficulty(val) {
            difficulty = val;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            if(val === 3) document.getElementById('btn-easy').classList.add('active');
            if(val === 4) document.getElementById('btn-med').classList.add('active');
            if(val === 6) document.getElementById('btn-hard').classList.add('active');
            resetGame();
        }

        function resetGame() {
            initGame();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isPeeking) {
                ctx.globalAlpha = 0.3;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                ctx.globalAlpha = 1.0;
            }

            // Draw locked pieces first (bottom)
            pieces.filter(p => p.isLocked).forEach(p => p.draw());
            
            // Draw unlocked pieces
            pieces.filter(p => !p.isLocked && p !== selectedPiece).forEach(p => p.draw());

            // Draw selected piece on top
            if (selectedPiece) selectedPiece.draw();

            if (!isWon) requestAnimationFrame(render);
        }

        function checkWin() {
            const allLocked = pieces.every(p => p.isLocked);
            if (allLocked && !isWon) {
                isWon = true;
                const endTime = Date.now();
                const totalTime = Math.floor((endTime - startTime) / 1000);
                document.getElementById('stats-text').innerText = `Time: ${totalTime}s | Moves: ${moves}`;
                winOverlay.classList.add('active');
            }
        }

        // Input Handling
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleStart(e) {
            if (isWon) return;
            const pos = getMousePos(e);
            
            // Find clicked piece (search from top down)
            for (let i = pieces.length - 1; i >= 0; i--) {
                const p = pieces[i];
                if (!p.isLocked && 
                    pos.x >= p.x && pos.x <= p.x + p.sw &&
                    pos.y >= p.y && pos.y <= p.y + p.sh) {
                    
                    selectedPiece = p;
                    selectedPiece.offset.x = pos.x - p.x;
                    selectedPiece.offset.y = pos.y - p.y;
                    
                    // Move to end of array to draw on top
                    pieces.splice(i, 1);
                    pieces.push(selectedPiece);
                    break;
                }
            }
        }

        function handleMove(e) {
            if (!selectedPiece || isWon) return;
            e.preventDefault();
            const pos = getMousePos(e);
            selectedPiece.x = pos.x - selectedPiece.offset.x;
            selectedPiece.y = pos.y - selectedPiece.offset.y;
        }

        function handleEnd() {
            if (!selectedPiece) return;
            
            moves++;
            const snapped = selectedPiece.checkSnap();
            selectedPiece = null;
            checkWin();
        }

        // Event Listeners
        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        peekBtn.addEventListener('mousedown', () => isPeeking = true);
        window.addEventListener('mouseup', () => isPeeking = false);
        peekBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isPeeking = true; });
        window.addEventListener('touchend', () => isPeeking = false);

        window.addEventListener('resize', () => {
            // Re-scale piece positions on window resize
            const oldW = canvas.width;
            const oldH = canvas.height;
            resizeCanvas();
            const scaleX = canvas.width / oldW;
            const scaleY = canvas.height / oldH;
            
            pieces.forEach(p => {
                p.x *= scaleX;
                p.y *= scaleY;
                p.sw *= scaleX;
                p.sh *= scaleY;
                p.correctX *= scaleX;
                p.correctY *= scaleY;
            });
        });

        // Initialize
        window.onload = initGame;
    </script>
</body>
</html>
