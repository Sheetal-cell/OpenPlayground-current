<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireStream - Next-Gen Job Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .tab-active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 font-extrabold text-xl tracking-tight cursor-pointer" onclick="switchView('candidate')">
                <i class="fa-solid fa-bolt-lightning text-blue-600"></i>
                <span>Hire<span class="text-blue-600">Stream</span></span>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-semibold">
                <button onclick="switchView('candidate')" id="nav-candidate" class="hover:text-blue-600 transition tab-active py-5">Find Jobs</button>
                <button onclick="switchView('recruiter')" id="nav-recruiter" class="hover:text-blue-600 transition py-5">Recruiter Portal</button>
            </div>

            <div class="flex items-center gap-4">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs">JD</div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-8">
        
        <!-- View: Candidate Job Board -->
        <div id="view-candidate" class="space-y-8 animate-slide-up">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">Explore Open Roles</h1>
                    <p class="text-slate-500">Discover your next career milestone</p>
                </div>
                <div class="flex w-full md:w-auto gap-2">
                    <div class="relative flex-1 md:w-64">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" placeholder="Search roles..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Job Feed -->
                <div class="lg:col-span-2 space-y-4" id="job-feed">
                    <!-- Jobs Injected Here -->
                </div>

                <!-- Sidebar Info -->
                <div class="space-y-6">
                    <div class="glass-card p-6 rounded-3xl border-blue-100 bg-blue-50/30">
                        <h3 class="font-bold text-lg mb-3">Your Activity</h3>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-slate-500">Applications Sent</span>
                                <span class="font-bold text-blue-600" id="stat-applied">0</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-slate-500">Interviews</span>
                                <span class="font-bold text-green-600">0</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="glass-card p-6 rounded-3xl">
                        <h3 class="font-bold text-lg mb-4">Saved Jobs</h3>
                        <div class="text-center py-8 text-slate-400 text-sm">
                            <i class="fa-regular fa-bookmark mb-2 text-2xl"></i>
                            <p>No saved jobs yet</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- View: Recruiter Dashboard -->
        <div id="view-recruiter" class="hidden space-y-8 animate-slide-up">
            <header class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black text-slate-900">Recruiter Center</h1>
                    <p class="text-slate-500">Manage your listings and evaluate talent</p>
                </div>
                <button onclick="toggleModal('jobModal')" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-blue-700 transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i>
                    Post a Job
                </button>
            </header>

            <div class="grid grid-cols-1 gap-6">
                <div class="glass-card rounded-3xl overflow-hidden border-slate-200">
                    <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between">
                        <span class="text-sm font-bold text-slate-500 uppercase tracking-wider">Active Listings</span>
                        <span class="text-sm font-bold text-slate-400" id="count-listings">4 Jobs</span>
                    </div>
                    <div class="divide-y divide-slate-100" id="recruiter-job-list">
                        <!-- Recruiter Jobs Injected Here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal: Apply for Job -->
    <div id="applyModal" class="fixed inset-0 z-[60] hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden animate-slide-up">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-extrabold" id="apply-title">Apply for Position</h3>
                <button onclick="toggleModal('applyModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form onsubmit="handleApply(event)" class="p-6 space-y-4">
                <input type="hidden" id="apply-job-id">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Full Name</label>
                        <input type="text" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Email Address</label>
                        <input type="email" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase">Resume / CV Link</label>
                    <input type="url" placeholder="https://..." required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase">Why are you a good fit?</label>
                    <textarea rows="3" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                </div>
                <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">Submit Application</button>
            </form>
        </div>
    </div>

    <!-- Modal: Post Job -->
    <div id="jobModal" class="fixed inset-0 z-[60] hidden bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden animate-slide-up">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-xl font-extrabold">Post a New Role</h3>
                <button onclick="toggleModal('jobModal')" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form onsubmit="handlePostJob(event)" class="p-6 space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 uppercase">Job Title</label>
                    <input type="text" id="post-title" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Company</label>
                        <input type="text" id="post-company" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Location</label>
                        <input type="text" id="post-location" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Salary Range</label>
                        <input type="text" id="post-salary" placeholder="e.g. $80k - $120k" required class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Type</label>
                        <select id="post-type" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                            <option>Full-time</option>
                            <option>Contract</option>
                            <option>Remote</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">Publish Listing</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white text-sm font-bold rounded-full shadow-2xl opacity-0 transition-opacity z-[100] pointer-events-none">
        Success Message
    </div>

    <script>
        // Initial Jobs Data
        let jobs = [
            { id: 1, title: 'Senior UX Designer', company: 'Google', location: 'Mountain View, CA', type: 'Full-time', salary: '$140k - $180k', applicants: 12, posted: '2d ago', category: 'Design', applied: false },
            { id: 2, title: 'Full Stack Developer', company: 'Vercel', location: 'Remote', type: 'Remote', salary: '$130k - $160k', applicants: 45, posted: '1d ago', category: 'Engineering', applied: false },
            { id: 3, title: 'Marketing Manager', company: 'Airbnb', location: 'San Francisco, CA', type: 'Contract', salary: '$90k - $110k', applicants: 8, posted: '5h ago', category: 'Marketing', applied: false },
            { id: 4, title: 'Data Scientist', company: 'Netflix', location: 'Los Gatos, CA', type: 'Full-time', salary: '$160k - $220k', applicants: 29, posted: '3d ago', category: 'Engineering', applied: false }
        ];

        function switchView(view) {
            document.getElementById('view-candidate').classList.toggle('hidden', view !== 'candidate');
            document.getElementById('view-recruiter').classList.toggle('hidden', view !== 'recruiter');
            
            document.getElementById('nav-candidate').classList.toggle('tab-active', view === 'candidate');
            document.getElementById('nav-recruiter').classList.toggle('tab-active', view === 'recruiter');
            
            renderJobs();
        }

        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        }

        function showApply(id) {
            const job = jobs.find(j => j.id === id);
            document.getElementById('apply-title').innerText = `Apply for ${job.title}`;
            document.getElementById('apply-job-id').value = id;
            toggleModal('applyModal');
        }

        function handleApply(e) {
            e.preventDefault();
            const id = parseInt(document.getElementById('apply-job-id').value);
            const job = jobs.find(j => j.id === id);
            job.applied = true;
            job.applicants++;
            
            toggleModal('applyModal');
            showToast(`Application sent to ${job.company}!`);
            updateStats();
            renderJobs();
            e.target.reset();
        }

        function handlePostJob(e) {
            e.preventDefault();
            const newJob = {
                id: Date.now(),
                title: document.getElementById('post-title').value,
                company: document.getElementById('post-company').value,
                location: document.getElementById('post-location').value,
                type: document.getElementById('post-type').value,
                salary: document.getElementById('post-salary').value,
                applicants: 0,
                posted: 'Just now',
                category: 'General',
                applied: false
            };
            jobs.unshift(newJob);
            toggleModal('jobModal');
            showToast("Job listing published successfully!");
            renderJobs();
            e.target.reset();
        }

        function renderJobs() {
            // Render Candidate View
            const feed = document.getElementById('job-feed');
            feed.innerHTML = jobs.map(job => `
                <div class="glass-card p-6 rounded-3xl hover:border-blue-300 transition-all group animate-slide-up">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 font-bold group-hover:bg-blue-600 group-hover:text-white transition">
                                ${job.company.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-bold text-lg text-slate-900">${job.title}</h3>
                                <div class="flex items-center gap-2 text-sm text-slate-500">
                                    <span class="font-semibold text-blue-600">${job.company}</span>
                                    <span>•</span>
                                    <span><i class="fa-solid fa-location-dot mr-1"></i>${job.location}</span>
                                </div>
                            </div>
                        </div>
                        <button class="text-slate-300 hover:text-red-400 transition text-lg"><i class="fa-regular fa-bookmark"></i></button>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 mb-6">
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold">${job.type}</span>
                        <span class="px-3 py-1 bg-green-50 text-green-600 rounded-lg text-xs font-bold">${job.salary}</span>
                        <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold">${job.category}</span>
                    </div>

                    <div class="flex justify-between items-center border-t border-slate-100 pt-4">
                        <span class="text-xs text-slate-400 font-medium">Posted ${job.posted}</span>
                        ${job.applied ? 
                            `<span class="text-green-600 font-bold text-sm flex items-center gap-2">
                                <i class="fa-solid fa-circle-check"></i> Applied
                             </span>` : 
                            `<button onclick="showApply(${job.id})" class="px-5 py-2 bg-slate-900 text-white text-sm font-bold rounded-xl hover:bg-blue-600 transition">Apply Now</button>`
                        }
                    </div>
                </div>
            `).join('');

            // Render Recruiter View
            const recruiterList = document.getElementById('recruiter-job-list');
            recruiterList.innerHTML = jobs.map(job => `
                <div class="px-6 py-5 flex items-center justify-between hover:bg-slate-50 transition">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-slate-200 flex items-center justify-center text-slate-500 font-bold text-xs">
                            ${job.company.charAt(0)}
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-900">${job.title}</h4>
                            <p class="text-xs text-slate-400 font-medium">${job.location} • Posted ${job.posted}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-8">
                        <div class="text-right">
                            <div class="text-sm font-black text-slate-900">${job.applicants}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Applicants</div>
                        </div>
                        <div class="flex gap-2">
                            <button class="p-2 text-slate-400 hover:text-blue-600 transition"><i class="fa-solid fa-eye"></i></button>
                            <button class="p-2 text-slate-400 hover:text-red-500 transition"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('count-listings').innerText = `${jobs.length} Jobs`;
        }

        function updateStats() {
            const appliedCount = jobs.filter(j => j.applied).length;
            document.getElementById('stat-applied').innerText = appliedCount;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

        // Initialize
        renderJobs();
    </script>
</body>
</html>
