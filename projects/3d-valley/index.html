<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valley of the Kings · Ancient Egypt 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Cinzel', 'Georgia', serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(60, 40, 20, 0.7);
            backdrop-filter: blur(8px);
            color: #f0dbb0;
            padding: 12px 28px;
            border-radius: 50px;
            border: 2px solid #c9a87c;
            pointer-events: none;
            box-shadow: 0 10px 25px -10px rgba(0,0,0,0.6);
            font-size: 0.95rem;
        }
        #info span {
            color: #ffd966;
            font-weight: 600;
        }
        #controls-note {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(30,20,10,0.5);
            backdrop-filter: blur(4px);
            color: #e5c8a3;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #b88a5a;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="info">
        🔺 <span>VALLEY OF THE KINGS</span> · pyramids & sphinx · 3D
    </div>
    <div id="controls-note">
        🖱️ drag to rotate · scroll to zoom
    </div>

    <!-- Import Three.js and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87c0e8); // sky blue
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(25, 12, 35);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // optional CSS2 renderer for labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.4;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 15;
        controls.maxDistance = 60;
        
        // --- lighting ---
        const ambient = new THREE.AmbientLight(0x605040);
        scene.add(ambient);
        
        // sun
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        sunLight.position.set(20, 40, 15);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 40;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 60;
        scene.add(sunLight);
        
        // fill light
        const fillLight = new THREE.PointLight(0xffaa88, 0.6);
        fillLight.position.set(-10, 10, 20);
        scene.add(fillLight);
        
        // --- desert ground ---
        const groundGeo = new THREE.CircleGeometry(60, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0xc49a6c, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- pyramids ---
        function createPyramid(x, z, size, color = 0xc9a87c) {
            const group = new THREE.Group();
            
            const base = new THREE.Mesh(
                new THREE.BoxGeometry(size * 2, size * 0.5, size * 2),
                new THREE.MeshStandardMaterial({ color: 0xaa8866 })
            );
            base.position.y = size * 0.25;
            base.castShadow = true;
            base.receiveShadow = true;
            group.add(base);
            
            const body = new THREE.Mesh(
                new THREE.ConeGeometry(size, size * 1.8, 4),
                new THREE.MeshStandardMaterial({ color: color })
            );
            body.position.y = size * 0.5 + size * 0.9;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            group.position.set(x, -0.5, z);
            return group;
        }
        
        // main pyramid
        scene.add(createPyramid(0, 0, 5, 0xd9b282));
        
        // smaller pyramids
        scene.add(createPyramid(-8, -5, 3, 0xb88a5a));
        scene.add(createPyramid(7, 6, 2.5, 0xb88a5a));
        scene.add(createPyramid(5, -7, 3, 0xc49a6c));
        scene.add(createPyramid(-6, 8, 2, 0xc49a6c));
        
        // --- sphinx (simplified) ---
        const sphinxGroup = new THREE.Group();
        sphinxGroup.position.set(-4, -0.5, -6);
        
        // body
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(2, 1, 4),
            new THREE.MeshStandardMaterial({ color: 0xccaa88 })
        );
        body.position.y = 0.5;
        body.castShadow = true;
        body.receiveShadow = true;
        sphinxGroup.add(body);
        
        // head
        const head = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 6),
            new THREE.MeshStandardMaterial({ color: 0xccaa88 })
        );
        head.position.set(0, 1.2, 1.6);
        head.castShadow = true;
        sphinxGroup.add(head);
        
        // headdress (simple)
        const headdress = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.3, 0.8),
            new THREE.MeshStandardMaterial({ color: 0xaa8866 })
        );
        headdress.position.set(0, 1.6, 1.6);
        headdress.castShadow = true;
        sphinxGroup.add(headdress);
        
        scene.add(sphinxGroup);
        
        // --- obelisks ---
        function createObelisk(x, z) {
            const group = new THREE.Group();
            
            const shaft = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4, 0.6, 4, 4),
                new THREE.MeshStandardMaterial({ color: 0xccaa88 })
            );
            shaft.position.y = 2;
            shaft.castShadow = true;
            group.add(shaft);
            
            const top = new THREE.Mesh(
                new THREE.ConeGeometry(0.3, 1, 4),
                new THREE.MeshStandardMaterial({ color: 0xddaa66 })
            );
            top.position.y = 4.2;
            top.castShadow = true;
            group.add(top);
            
            group.position.set(x, -0.5, z);
            return group;
        }
        
        scene.add(createObelisk(6, 5));
        scene.add(createObelisk(-5, -7));
        
        // --- palm trees ---
        function createPalm(x, z) {
            const group = new THREE.Group();
            
            // trunk
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.5, 2.5, 5),
                new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
            );
            trunk.position.y = 1.25;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            // leaves
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
            for (let i = 0; i < 5; i++) {
                const leaf = new THREE.Mesh(
                    new THREE.ConeGeometry(0.6, 1.2, 4),
                    leafMat
                );
                const angle = (i / 5) * Math.PI * 2;
                leaf.position.set(
                    Math.cos(angle) * 0.8,
                    2.0,
                    Math.sin(angle) * 0.8
                );
                leaf.rotation.z = 0.2;
                leaf.castShadow = true;
                group.add(leaf);
            }
            
            group.position.set(x, -0.5, z);
            return group;
        }
        
        for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 12 + Math.random() * 8;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            scene.add(createPalm(x, z));
        }
        
        // --- tomb entrance (small structure) ---
        const tombGroup = new THREE.Group();
        tombGroup.position.set(10, -0.5, -8);
        
        const tombBase = new THREE.Mesh(
            new THREE.BoxGeometry(2, 1, 3),
            new THREE.MeshStandardMaterial({ color: 0xaa8866 })
        );
        tombBase.position.y = 0.5;
        tombBase.castShadow = true;
        tombBase.receiveShadow = true;
        tombGroup.add(tombBase);
        
        const tombRoof = new THREE.Mesh(
            new THREE.ConeGeometry(1.5, 1, 4),
            new THREE.MeshStandardMaterial({ color: 0xccaa88 })
        );
        tombRoof.position.y = 1.2;
        tombRoof.castShadow = true;
        tombGroup.add(tombRoof);
        
        scene.add(tombGroup);
        
        // --- camels (simplified) near tomb ---
        const camelGroup = new THREE.Group();
        for (let i = 0; i < 3; i++) {
            const camelBody = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.6, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xc49a6c })
            );
            camelBody.position.set(12 + i*1.5, -0.2, -6);
            camelBody.castShadow = true;
            camelBody.receiveShadow = true;
            scene.add(camelBody);
        }
        
        // --- floating dust particles (desert haze) ---
        const dustGeo = new THREE.BufferGeometry();
        const dustCount = 500;
        const dustPos = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount * 3; i += 3) {
            dustPos[i] = (Math.random() - 0.5) * 60;
            dustPos[i+1] = Math.random() * 10;
            dustPos[i+2] = (Math.random() - 0.5) * 60;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xd9b282, size: 0.1, transparent: true, opacity: 0.3 });
        const dust = new THREE.Points(dustGeo, dustMat);
        scene.add(dust);
        
        // --- fog (heat haze) ---
        scene.fog = new THREE.FogExp2(0x87c0e8, 0.002);
        
        // --- labels (CSS2D) ---
        const labelPositions = [
            { text: 'Great Pyramid', pos: [0, 6, 0] },
            { text: 'Sphinx', pos: [-4, 1.5, -6] },
            { text: 'Tomb of Anubis', pos: [10, 2, -8] },
            { text: 'Obelisk', pos: [6, 5, 5] }
        ];
        
        labelPositions.forEach(l => {
            const div = document.createElement('div');
            div.textContent = l.text;
            div.style.color = '#f0dbb0';
            div.style.background = 'rgba(40,30,15,0.8)';
            div.style.border = '1px solid #c9a87c';
            div.style.borderRadius = '30px';
            div.style.padding = '2px 14px';
            div.style.fontSize = '12px';
            div.style.backdropFilter = 'blur(4px)';
            const label = new CSS2DObject(div);
            label.position.set(l.pos[0], l.pos[1], l.pos[2]);
            scene.add(label);
        });
        
        // --- animation loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            // rotate dust slowly
            dust.rotation.y += 0.0002;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        // --- resize handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
