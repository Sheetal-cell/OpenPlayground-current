<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenArt · Generative Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1e2a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #e0eaff;
        }

        .art-card {
            max-width: 1300px;
            width: 100%;
            background: #242b3a;
            border-radius: 60px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), 0 0 0 2px #4a6080 inset;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 2px solid #4a6080;
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title h1 {
            font-size: 2.2rem;
            font-weight: 400;
            background: linear-gradient(135deg, #c0e0ff, #ffc0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title p {
            color: #9ab8d9;
            font-size: 0.9rem;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            background: #1a212e;
            border-radius: 40px;
            padding: 1rem;
            border: 2px solid #4a6080;
            margin-bottom: 2rem;
        }

        canvas {
            display: block;
            width: 800px;
            height: 500px;
            border-radius: 24px;
            background: #0f1420;
            box-shadow: 0 0 0 2px #2f4058;
        }

        .control-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .control-group {
            background: #1a212e;
            border-radius: 30px;
            padding: 1.2rem 1.5rem;
            border: 2px solid #4a6080;
        }

        .control-group h3 {
            color: #c0e0ff;
            font-weight: 400;
            margin-bottom: 1rem;
            font-size: 1rem;
            border-bottom: 1px solid #4a6080;
            padding-bottom: 0.5rem;
        }

        .slider-item {
            margin-bottom: 1rem;
        }

        .slider-item label {
            display: flex;
            justify-content: space-between;
            color: #9ab8d9;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .slider-item input {
            width: 100%;
        }

        .color-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .color-item label {
            flex: 1;
            color: #9ab8d9;
        }

        .color-item input[type="color"] {
            width: 60px;
            height: 40px;
            border: 2px solid #4a6080;
            border-radius: 20px;
            background: transparent;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .btn {
            background: #1a212e;
            border: 2px solid #5a7090;
            border-radius: 40px;
            padding: 0.8rem 1.8rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #d0e8ff;
            cursor: pointer;
            transition: 0.1s;
            flex: 1;
            min-width: 100px;
        }

        .btn:hover {
            background: #2a3442;
            border-color: #7a90b0;
        }

        .btn.primary {
            background: #3f6b9f;
            border-color: #3f6b9f;
            color: white;
        }

        .preset-bar {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1.5rem 0 1rem;
        }

        .preset-btn {
            background: #1a212e;
            border: 2px solid #4a6080;
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            color: #b0d0f0;
            transition: 0.1s;
            font-size: 0.85rem;
        }

        .preset-btn:hover {
            background: #2a3442;
        }

        .footer {
            text-align: center;
            color: #7a90b0;
            margin-top: 2rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="art-card">
        <div class="header">
            <div class="title">
                <h1>🎨 GenArt Studio</h1>
                <p>generative art · real-time parameters</p>
            </div>
        </div>

        <!-- canvas -->
        <div class="canvas-container">
            <canvas id="artCanvas" width="800" height="500"></canvas>
        </div>

        <!-- presets -->
        <div class="preset-bar">
            <button class="preset-btn" id="presetWave">🌊 wave</button>
            <button class="preset-btn" id="presetSpiral">🌀 spiral</button>
            <button class="preset-btn" id="presetParticles">✨ particles</button>
            <button class="preset-btn" id="presetLines">📏 lines</button>
            <button class="preset-btn" id="presetRandom">🎲 random</button>
        </div>

        <!-- main controls -->
        <div class="control-panel">
            <div class="control-group">
                <h3>🔧 parameters</h3>
                <div class="slider-item">
                    <label>complexity <span id="complexityVal">5</span></label>
                    <input type="range" id="complexity" min="1" max="10" value="5" step="1">
                </div>
                <div class="slider-item">
                    <label>density <span id="densityVal">50</span></label>
                    <input type="range" id="density" min="10" max="200" value="50" step="5">
                </div>
                <div class="slider-item">
                    <label>rotation <span id="rotationVal">0</span></label>
                    <input type="range" id="rotation" min="0" max="360" value="0" step="5">
                </div>
                <div class="slider-item">
                    <label>blur <span id="blurVal">0</span></label>
                    <input type="range" id="blur" min="0" max="10" value="0" step="1">
                </div>
            </div>

            <div class="control-group">
                <h3>🎨 colors</h3>
                <div class="color-item">
                    <label>primary</label>
                    <input type="color" id="color1" value="#ff6b6b">
                </div>
                <div class="color-item">
                    <label>secondary</label>
                    <input type="color" id="color2" value="#4ecdc4">
                </div>
                <div class="color-item">
                    <label>accent</label>
                    <input type="color" id="color3" value="#ffe66d">
                </div>
                <div class="color-item">
                    <label>background</label>
                    <input type="color" id="bgColor" value="#0f1420">
                </div>
            </div>

            <div class="control-group">
                <h3>⚡ actions</h3>
                <div class="button-group">
                    <button class="btn" id="randomizeBtn">randomize</button>
                    <button class="btn" id="exportBtn">export PNG</button>
                    <button class="btn primary" id="redrawBtn">redraw</button>
                </div>
                <div style="margin-top: 1rem; color: #9ab8d9; font-size: 0.8rem;">
                    seed: <span id="seedDisplay">12345</span>
                </div>
            </div>
        </div>

        <div class="footer">
            ⚡ adjust parameters and click redraw · export your creation
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('artCanvas');
            const ctx = canvas.getContext('2d');
            const width = 800;
            const height = 500;

            // state
            let seed = 12345;
            let complexity = 5;
            let density = 50;
            let rotation = 0;
            let blur = 0;
            let color1 = '#ff6b6b';
            let color2 = '#4ecdc4';
            let color3 = '#ffe66d';
            let bgColor = '#0f1420';

            // DOM elements
            const complexitySlider = document.getElementById('complexity');
            const complexityVal = document.getElementById('complexityVal');
            const densitySlider = document.getElementById('density');
            const densityVal = document.getElementById('densityVal');
            const rotationSlider = document.getElementById('rotation');
            const rotationVal = document.getElementById('rotationVal');
            const blurSlider = document.getElementById('blur');
            const blurVal = document.getElementById('blurVal');
            const color1Input = document.getElementById('color1');
            const color2Input = document.getElementById('color2');
            const color3Input = document.getElementById('color3');
            const bgColorInput = document.getElementById('bgColor');
            const randomizeBtn = document.getElementById('randomizeBtn');
            const exportBtn = document.getElementById('exportBtn');
            const redrawBtn = document.getElementById('redrawBtn');
            const seedSpan = document.getElementById('seedDisplay');

            // preset buttons
            const presetWave = document.getElementById('presetWave');
            const presetSpiral = document.getElementById('presetSpiral');
            const presetParticles = document.getElementById('presetParticles');
            const presetLines = document.getElementById('presetLines');
            const presetRandom = document.getElementById('presetRandom');

            // seeded random
            function seededRandom() {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            }

            // random between min and max
            function randomRange(min, max, useSeed = true) {
                if (useSeed) {
                    return min + seededRandom() * (max - min);
                }
                return min + Math.random() * (max - min);
            }

            // draw functions
            function drawWave() {
                ctx.clearRect(0, 0, width, height);
                
                const steps = density * 2;
                const amp = 50 + complexity * 10;
                const freq = 0.01 + complexity * 0.005;

                ctx.lineWidth = 2;
                
                for (let i = 0; i < steps; i++) {
                    const y = (i / steps) * height;
                    
                    ctx.beginPath();
                    ctx.strokeStyle = i % 3 === 0 ? color1 : (i % 3 === 1 ? color2 : color3);
                    
                    for (let x = 0; x < width; x += 5) {
                        const offset = Math.sin(x * freq + rotation * 0.01 + i * 0.1) * amp;
                        if (x === 0) {
                            ctx.moveTo(x, y + offset);
                        } else {
                            ctx.lineTo(x, y + offset);
                        }
                    }
                    ctx.stroke();
                }
            }

            function drawSpiral() {
                ctx.clearRect(0, 0, width, height);
                
                const centerX = width / 2;
                const centerY = height / 2;
                const maxRadius = Math.min(width, height) * 0.4;
                const turns = complexity * 3;
                const points = density * 5;

                ctx.lineWidth = 1.5;
                
                for (let i = 0; i < points; i++) {
                    const t = i / points;
                    const angle = t * Math.PI * 2 * turns + rotation * 0.01;
                    const radius = t * maxRadius;
                    
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 2 + complexity * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = i % 3 === 0 ? color1 : (i % 3 === 1 ? color2 : color3);
                    ctx.fill();
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, width, height);
                
                const count = density * 5;
                
                for (let i = 0; i < count; i++) {
                    const x = randomRange(0, width, true);
                    const y = randomRange(0, height, true);
                    const size = 2 + randomRange(0, complexity * 2, true);
                    
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = i % 3 === 0 ? color1 : (i % 3 === 1 ? color2 : color3);
                    ctx.fill();
                }
            }

            function drawLines() {
                ctx.clearRect(0, 0, width, height);
                
                const lines = density;
                ctx.lineWidth = 2 + complexity;
                
                for (let i = 0; i < lines; i++) {
                    const x1 = randomRange(0, width, true);
                    const y1 = randomRange(0, height, true);
                    const x2 = randomRange(0, width, true);
                    const y2 = randomRange(0, height, true);
                    
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = i % 3 === 0 ? color1 : (i % 3 === 1 ? color2 : color3);
                    ctx.stroke();
                }
            }

            // current draw function
            let currentMode = 'wave';

            function draw() {
                // set background
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, width, height);
                
                // apply blur if needed
                if (blur > 0) {
                    ctx.filter = `blur(${blur}px)`;
                }

                // call appropriate draw function
                if (currentMode === 'wave') drawWave();
                else if (currentMode === 'spiral') drawSpiral();
                else if (currentMode === 'particles') drawParticles();
                else if (currentMode === 'lines') drawLines();

                // reset filter
                ctx.filter = 'none';
            }

            // update UI bindings
            function bindControls() {
                complexitySlider.addEventListener('input', () => {
                    complexity = parseInt(complexitySlider.value);
                    complexityVal.innerText = complexity;
                });
                densitySlider.addEventListener('input', () => {
                    density = parseInt(densitySlider.value);
                    densityVal.innerText = density;
                });
                rotationSlider.addEventListener('input', () => {
                    rotation = parseInt(rotationSlider.value);
                    rotationVal.innerText = rotation;
                });
                blurSlider.addEventListener('input', () => {
                    blur = parseInt(blurSlider.value);
                    blurVal.innerText = blur;
                });

                color1Input.addEventListener('input', () => { color1 = color1Input.value; });
                color2Input.addEventListener('input', () => { color2 = color2Input.value; });
                color3Input.addEventListener('input', () => { color3 = color3Input.value; });
                bgColorInput.addEventListener('input', () => { bgColor = bgColorInput.value; });

                randomizeBtn.addEventListener('click', () => {
                    seed = Math.floor(Math.random() * 100000);
                    seedSpan.innerText = seed;
                    
                    complexity = Math.floor(randomRange(1, 10, false));
                    density = Math.floor(randomRange(10, 200, false));
                    rotation = Math.floor(randomRange(0, 360, false));
                    blur = Math.floor(randomRange(0, 10, false));
                    
                    complexitySlider.value = complexity;
                    densitySlider.value = density;
                    rotationSlider.value = rotation;
                    blurSlider.value = blur;
                    
                    complexityVal.innerText = complexity;
                    densityVal.innerText = density;
                    rotationVal.innerText = rotation;
                    blurVal.innerText = blur;
                    
                    draw();
                });

                redrawBtn.addEventListener('click', draw);
                
                exportBtn.addEventListener('click', () => {
                    const link = document.createElement('a');
                    link.download = `genart-${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                });
            }

            // presets
            presetWave.addEventListener('click', () => {
                currentMode = 'wave';
                draw();
            });
            presetSpiral.addEventListener('click', () => {
                currentMode = 'spiral';
                draw();
            });
            presetParticles.addEventListener('click', () => {
                currentMode = 'particles';
                draw();
            });
            presetLines.addEventListener('click', () => {
                currentMode = 'lines';
                draw();
            });
            presetRandom.addEventListener('click', () => {
                const modes = ['wave', 'spiral', 'particles', 'lines'];
                currentMode = modes[Math.floor(Math.random() * modes.length)];
                draw();
            });

            // initial
            bindControls();
            draw();
        })();
    </script>
</body>
</html>
